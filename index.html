<script>
    const MODEL_URL = 'https://raw.githubusercontent.com/masaok/flowerid-next/main/public/tfjs_model/model.json';
    const CLASSES = ['daisy', 'dandelion', 'roses', 'sunflowers', 'tulips'];

    let model = null;
    const status = document.getElementById('status');
    const uploadArea = document.getElementById('uploadArea');
    const imageUpload = document.getElementById('imageUpload');
    const previewContainer = document.getElementById('preview-container');
    const preview = document.getElementById('preview');
    const result = document.getElementById('result');
    const uploadBtn = document.querySelector('.upload-btn');

    function setStatus(text, type = '') {
        status.textContent = text;
        status.className = type;
    }

    async function loadModel() {
        try {
            setStatus('Laddar AI-modellen... 🌷', 'loading');
            model = await tf.loadGraphModel(MODEL_URL);
            setStatus('Modellen är klar! Ladda upp en blomma 💐', 'success');
        } catch (err) {
            setStatus('Kunde inte ladda modellen: ' + err.message, 'error');
            console.error(err);
        }
    }

    function preprocess(img) {
        return tf.browser.fromPixels(img)
            .resizeNearestNeighbor([224, 224])
            .toFloat()
            .div(255.0)
            .expandDims();
    }

    // Hjälpfunktion: softmax om det behövs (säkerställer [0,1] och summa ≈ 1)
    function softmax(arr) {
        const max = Math.max(...arr);
        const exps = arr.map(x => Math.exp(x - max));
        const sum = exps.reduce((a, b) => a + b, 0);
        return exps.map(x => x / sum);
    }

    async function predictImage(imgElement) {
        if (!model) {
            result.textContent = 'Modellen laddas fortfarande...';
            result.style.display = 'block';
            return;
        }

        try {
            const tensor = preprocess(imgElement);
            const outputTensor = await model.executeAsync(tensor);
            tensor.dispose();

            let rawPreds;
            if (Array.isArray(outputTensor)) {
                rawPreds = await outputTensor[0].data();
                outputTensor.forEach(t => t.dispose());
            } else {
                rawPreds = await outputTensor.data();
                outputTensor.dispose();
            }

            // Konvertera till array + applicera softmax (säkerhetsåtgärd)
            const probs = softmax(Array.from(rawPreds));

            console.log('Sannolikheter för varje klass:', probs.map(p => (p * 100).toFixed(1) + '%'));

            // Hitta högsta
            let maxProb = -1;
            let bestIndex = -1;
            probs.forEach((p, i) => {
                if (p > maxProb) {
                    maxProb = p;
                    bestIndex = i;
                }
            });

            const confidence = (maxProb * 100).toFixed(1);
            const flower = CLASSES[bestIndex];

            // Visa även alla procent i resultatet (bra för debugging)
            const allProbs = probs.map((p, i) => `${CLASSES[i]}: ${(p*100).toFixed(0)}%`).join(' | ');

            result.innerHTML = `
                Det här är en <strong>${flower}</strong><br>
                med ${confidence}% säkerhet 🌼<br>
                <small style="color:#666; font-size:0.9rem;">(${allProbs})</small>
            `;
            result.style.display = 'block';

        } catch (err) {
            result.textContent = 'Fel vid förutsägelse: ' + err.message;
            result.style.display = 'block';
            console.error(err);
        }
    }

    function handleFiles(files) {
        if (!files?.length) return;
        const file = files[0];
        if (!file.type.startsWith('image/')) {
            alert('Välj en bild tack!');
            return;
        }

        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            previewContainer.style.display = 'block';

            const img = new Image();
            img.onload = () => predictImage(img);
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Events (oförändrade)
    uploadArea.addEventListener('click', () => imageUpload.click());
    uploadBtn.addEventListener('click', () => imageUpload.click());
    imageUpload.addEventListener('change', e => handleFiles(e.target.files));

    uploadArea.addEventListener('dragover', e => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));

    uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    loadModel();
</script><!DOCTYPE html>

<body>
    <div class="container">

            </div>

            Skapad av Grok X. xAI
        </footer>
    </div>

    <script>
        const MODEL_URL = 'https://raw.githubusercontent.com/masaok/flowerid-next/main/public/tfjs_model/model.json';
        const CLASSES = ['daisy', 'dandelion', 'roses', 'sunflowers', 'tulips'];

        let model = null;
        const status = document.getElementById('status');
        const uploadArea = document.getElementById('uploadArea');
        const imageUpload = document.getElementById('imageUpload');
        const previewContainer = document.getElementById('preview-container');
        const preview = document.getElementById('preview');
        const result = document.getElementById('result');
        const uploadBtn = document.querySelector('.upload-btn');

        function setStatus(text, type = '') {
            status.textContent = text;
            status.className = type;
        }

        async function loadModel() {
            try {
                setStatus('Laddar AI-modellen... 🌷', 'loading');
                model = await tf.loadGraphModel(MODEL_URL);
                setStatus('Modellen är redo! Testa med olika blommor 💐', 'success');
            } catch (err) {
                setStatus('Kunde inte ladda modellen: ' + err.message, 'error');
                console.error(err);
            }
        }

        function preprocess(img) {
            return tf.browser.fromPixels(img)
                .resizeNearestNeighbor([224, 224])
                .toFloat()
                .div(255.0)
                .expandDims();
        }

        function softmax(arr) {
            const max = Math.max(...arr);
            const exps = arr.map(x => Math.exp(x - max));
            const sum = exps.reduce((a, b) => a + b, 0);
            return exps.map(x => x / sum);
        }

        async function predictImage(imgElement) {
            if (!model) {
                result.textContent = 'Modellen laddas fortfarande...';
                result.style.display = 'block';
                return;
            }

            try {
                const tensor = preprocess(imgElement);
                const output = await model.executeAsync(tensor);
                tensor.dispose();

                let rawData;
                if (Array.isArray(output)) {
                    rawData = await output[0].data();
                    output.forEach(t => t.dispose());
                } else {
                    rawData = await output.data();
                    output.dispose();
                }

                const probs = softmax(Array.from(rawData));
                console.log('Prediktioner:', probs.map((p, i) => `${CLASSES[i]}: ${(p*100).toFixed(1)}%`));

                let maxProb = Math.max(...probs);
                let bestIdx = probs.indexOf(maxProb);

                const confidence = (maxProb * 100).toFixed(1);
                const flower = CLASSES[bestIdx];

                const all = probs.map((p, i) => `${CLASSES[i]} ${(p*100).toFixed(0)}%`).join(' • ');
